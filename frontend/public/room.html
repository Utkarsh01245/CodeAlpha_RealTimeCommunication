<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConnectX — Room</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="/css/room.css" />
  </head>
  <body class="room-body">

    <!-- ── Room Header ────────────────────────────────────────────────── -->
    <header class="room-header">
      <div class="room-info">
        <a href="/" class="brand-mini">⬡ ConnectX</a>
        <span class="room-id-badge" id="roomIdDisplay"></span>
        <button class="btn-icon" title="Copy Room ID" onclick="copyRoomId()">📋</button>
      </div>
      <div class="room-meta">
        <span class="user-count"><span id="userCount">1</span> Participant(s)</span>
        <span class="timer" id="callTimer">00:00</span>
        <span class="security-badge">🔒 Encrypted</span>
      </div>
    </header>

    <!-- ── Main Layout ─────────────────────────────────────────────────── -->
    <main class="room-main">

      <!-- ── Video Area ──────────────────────────────────────────────── -->
      <div class="video-area" id="videoArea">
        <!-- Local video always shown -->
        <div class="video-tile self-tile" id="selfTile">
          <video id="localVideo" autoplay muted playsinline></video>
          <div class="tile-overlay">
            <span class="tile-name" id="selfName">You</span>
            <span class="tile-muted hidden" id="selfMutedIcon">🔇</span>
          </div>
        </div>
        <!-- Remote videos injected here by JS -->
      </div>

      <!-- ── Sidebar (Chat / Files / Whiteboard) ──────────────────────── -->
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-tabs">
          <button class="stab active" data-tab="chat" onclick="openTab('chat', this)">💬 Chat</button>
          <button class="stab" data-tab="files" onclick="openTab('files', this)">📁 Files</button>
          <button class="stab" data-tab="whiteboard" onclick="openTab('whiteboard', this)">✏️ Board</button>
        </div>

        <!-- CHAT TAB -->
        <div class="tab-content active" id="chatTab">
          <div class="messages-area" id="messagesArea"></div>
          <div class="chat-input-row">
            <input
              type="text"
              id="chatInput"
              placeholder="Type a message…"
              class="input-field"
              onkeypress="handleChatKey(event)"
            />
            <button class="btn btn-primary" onclick="sendMessage()">➤</button>
          </div>
        </div>

        <!-- FILES TAB -->
        <div class="tab-content hidden" id="filesTab">
          <div class="upload-zone" onclick="document.getElementById('fileInput').click()">
            <div class="upload-icon">📤</div>
            <p>Click to upload a file</p>
            <small>Max 25MB per file</small>
          </div>
          <input type="file" id="fileInput" class="hidden" onchange="uploadFile(event)" />
          <div class="files-list" id="filesList"></div>
        </div>

        <!-- WHITEBOARD TAB -->
        <div class="tab-content hidden" id="whiteboardTab">
          <div class="wb-tools">
            <button class="wb-btn active" id="wbPen" onclick="setWbTool('pen', this)" title="Pen">✒️</button>
            <button class="wb-btn" id="wbEraser" onclick="setWbTool('eraser', this)" title="Eraser">🧹</button>
            <input type="color" id="wbColor" value="#ffffff" title="Color" class="wb-color" />
            <input type="range" id="wbSize" min="1" max="30" value="3" class="wb-size" title="Size" />
            <button class="wb-btn" onclick="undoWhiteboard()" title="Undo">↩</button>
            <button class="wb-btn wb-clear" onclick="clearWhiteboard()" title="Clear">🗑</button>
          </div>
          <canvas id="whiteboardCanvas" class="whiteboard-canvas"></canvas>
        </div>
      </aside>
    </main>

    <!-- ── Controls Bar ───────────────────────────────────────────────── -->
    <footer class="controls-bar">
      <div class="controls-left">
        <button class="ctrl-btn-big active" id="micBtn" onclick="toggleMic()" title="Toggle Microphone">
          🎤<span>Mic</span>
        </button>
        <button class="ctrl-btn-big active" id="camBtn" onclick="toggleCamera()" title="Toggle Camera">
          📹<span>Cam</span>
        </button>
      </div>
      <div class="controls-center">
        <button class="ctrl-btn-big" id="screenBtn" onclick="toggleScreenShare()" title="Share Screen">
          🖥<span>Screen</span>
        </button>
        <button class="ctrl-btn-big end-call" onclick="endCall()" title="End Call">
          📵<span>End</span>
        </button>
      </div>
      <div class="controls-right">
        <button class="ctrl-btn-big" onclick="toggleSidebar()" title="Toggle Panel">
          💬<span>Panel</span>
        </button>
      </div>
    </footer>

    <!-- ── Toast Notification ─────────────────────────────────────────── -->
    <div class="toast hidden" id="toast"></div>

    <!-- ── Scripts ────────────────────────────────────────────────────── -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/room.js"></script>
  </body>
</html>
